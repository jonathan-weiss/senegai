<!-- @tt{{{
    @rlb

    @move-comment-backward
    @template-renderer [
        templateRendererClassName="EntityResultComponentHtmlRenderer"
        templateRendererPackageName="senegai.codegen.renderer.angular"
        templateRendererInterfaceName="UiEntityRenderer"
        templateRendererInterfacePackageName="senegai.codegen.renderer.angular"
    ] [
        modelClassName="UiEntityModel"
        modelPackageName="senegai.codegen.renderer.model.ui"
        modelName="model"
    ]

    @replace-value-by-expression
        [ searchValue="OpusMagnum" replaceByExpression="model.entityName.pascalCase" ]
        [ searchValue="opusMagnum" replaceByExpression="model.entityName.camelCase" ]
        [ searchValue="opus-magnum" replaceByExpression="model.entityName.kebabCase" ]

    @modify-provided-filename-by-replacements

    @rla

}}}@ -->
<div class="opus-magnum-table-container">
    <div class="opus-magnum-result-actions">
        <button mat-raised-button color="primary" (click)="onCreate()">
            <mat-icon>add</mat-icon>
            <ng-container>New OpusMagnum</ng-container>
        </button>
    </div>
    <table mat-table [dataSource]="dataSource">
        <!-- @tt{{{ @rlb  @ignore-text @rla }}}@ -->
        <!-- IndexUnicus Column -->
        <ng-container matColumnDef="indexUnicus">
            <th mat-header-cell *matHeaderCellDef>IndexUnicus</th>
            <td mat-cell *matCellDef="let opusMagnum">{{ opusMagnum.indexUnicus }}</td>
        </ng-container>
        <!-- @tt{{{ @rlb  @end-ignore-text @rla }}}@ -->

        <!-- @tt{{{
            @foreach [ iteratorExpression="model.searchResultAttributes" loopVariable="attribute" ]

                @replace-value-by-expression
                [ searchValue="title" replaceByExpression="attribute.attributeName.camelCase" ]
                [ searchValue="Title" replaceByExpression="attribute.attributeName.pascalCase" ]
                [ searchValue="string" replaceByExpression="attribute.typescriptAttributeType" ]

        }}}@  -->
        <!-- Title Column -->
        <ng-container matColumnDef="title">
            <th mat-header-cell *matHeaderCellDef>Title</th>
            <td mat-cell *matCellDef="let opusMagnum">{{ opusMagnum.title }}</td>
        </ng-container>
        <!-- @tt{{{ @rlb @end-foreach @rla }}}@ -->

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let opusMagnum">
                <button mat-icon-button color="primary" (click)="onEdit(opusMagnum)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="onDelete(opusMagnum)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</div>
