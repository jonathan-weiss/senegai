<div class="edit-form-container">
    <mat-card>
        <mat-card-header>
            <mat-card-title>{{ silvaOptionum ? 'Edit OpusMagnum' : 'New OpusMagnum' }}</mat-card-title>
        </mat-card-header>

        <mat-card-content>
            <form [formGroup]="silvaOptionumForm" (ngSubmit)="onSubmit()">
                <app-opus-magnum-silva-optionum-form-part [silvaOptionumForm]="silvaOptionumForm" />

                <div class="form-actions">
                    <button mat-button type="button" (click)="onCancel()">
                        Cancel
                    </button>
                    <button mat-raised-button color="primary" type="submit" [disabled]="!silvaOptionumForm.valid">
                        Save
                    </button>
                </div>
            </form>
        </mat-card-content>
    </mat-card>
</div>
