<div class="table-container">
    <div class="action-bar">
        <button mat-button color="primary" (click)="onAdd()">
            <mat-icon>add</mat-icon> Add ArticulusInterior...
        </button>

    </div>
    <table mat-table [dataSource]="dataSource">
        <!-- @tt{{{
            @foreach [ iteratorExpression="model.item.attributes" loopVariable="attribute" ]

            @replace-value-by-expression
            [ searchValue="description" replaceByExpression="attribute.attributeName.camelCase" ]
            [ searchValue="Description" replaceByExpression="attribute.attributeName.pascalCase" ]


        }}}@  -->

        <!-- Description Column -->
        <ng-container matColumnDef="description">
            <th mat-header-cell *matHeaderCellDef>Description</th>
            <td mat-cell *matCellDef="let tableRow" (click)="onSelect(tableRow.formGroup)">
                {{ tableRow.description }}
            </td>
        </ng-container>
        <!-- @tt{{{ @remove-blanks-and-linebreak-before-comment @end-foreach @remove-blanks-and-linebreak-after-comment }}}@  -->
        <!-- @tt{{{ @ignore-text @remove-blanks-and-linebreak-after-comment }}}@ -->

        <!-- Year Column -->
        <ng-container matColumnDef="year">
            <th mat-header-cell *matHeaderCellDef>Year</th>
            <td mat-cell *matCellDef="let tableRow" (click)="onSelect(tableRow.formGroup)">
                {{ tableRow.year }}
            </td>
        </ng-container>
        <!-- @tt{{{ @end-ignore-text @remove-blanks-and-linebreak-after-comment }}}@ -->


        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let tableRow">
                <button mat-icon-button color="primary" (click)="onEdit(tableRow.formGroup)">
                    <mat-icon>edit</mat-icon>
                </button>
                <button mat-icon-button color="warn" (click)="onDelete(tableRow.formGroup)">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.selectedRow] = "isSelected(row)"></tr>
    </table>
</div>
