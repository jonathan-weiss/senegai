<mat-form-field appearance="fill" style="width: 100%">
    @if (label != '') {
        <mat-label>{{ label }}</mat-label>
    }
    <input matInput [formControl]="numberFormControl" [placeholder]="placeholder">
    <app-field-error-messages [control]="numberFormControl" [validatorTranslations]="validatorTranslations" />
</mat-form-field>
