<div class="table-container">
    <div class="action-bar">
        <button mat-button color="primary" (click)="onAdd()" type="button">
            <mat-icon>add</mat-icon> {{ addButtonLabel }}
        </button>
    </div>
    <table mat-table [dataSource]="dataSource">
        <!-- Field Column -->
        <ng-container matColumnDef="field">
            <th mat-header-cell *matHeaderCellDef>{{ columnHeader }}</th>
            <td mat-cell *matCellDef="let control" (click)="onSelect(control)">
                <ng-container *ngTemplateOutlet="fieldTemplate; context: { $implicit: control }"></ng-container>
            </td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef>Actions</th>
            <td mat-cell *matCellDef="let control">
                <button mat-icon-button color="warn" (click)="onDelete(control)" type="button">
                    <mat-icon>delete</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" [class.selectedRow]="isSelected(row)"></tr>
    </table>
</div>
